services:
  app:
    build: .
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
      - GEMMA_BACKEND=ollama
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - NEXT_PUBLIC_GEMMA_BACKEND=ollama
      - NEXT_PUBLIC_OLLAMA_URL=http://host.docker.internal:11434
      - NEXT_PUBLIC_API_PROXY_URL=/api/gemma
      - GEMMA_MODEL=gemma4:latest
      - RATE_LIMIT_PER_MIN=10
      - DAILY_CALL_LIMIT=2000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

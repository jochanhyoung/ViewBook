services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
      - GEMMA_BACKEND=ollama
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - NEXT_PUBLIC_GEMMA_BACKEND=ollama
      - NEXT_PUBLIC_OLLAMA_URL=http://host.docker.internal:11434
      - NEXT_PUBLIC_API_PROXY_URL=/api/gemma
      - GEMMA_MODEL=gemma4:latest
      - RATE_LIMIT_PER_MIN=10
      - DAILY_CALL_LIMIT=2000
      - STATS_DATA_DIR=/app/data
      - TEACHER_PASSWORD=teacher2025
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - stats-data:/app/data
    restart: unless-stopped

volumes:
  stats-data:
